name: Build Binary R Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      source_basename:
        description: "Source tarball basename, e.g. salso_0.3.72"
        required: true
        type: string
      os:
        description: "Target OS for binary package"
        required: true
        type: choice
        options:
          - windows
          - macOS

jobs:
  build-r-package:
    runs-on: ${{ inputs.os == 'windows' && 'windows-latest' || 'macos-latest' }}

    steps:
      - name: Install Rust GNU Toolchain (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu
          rustup default stable-x86_64-pc-windows-gnu
          rustup target add x86_64-pc-windows-gnu
          echo "CARGO_BUILD_TARGET=x86_64-pc-windows-gnu" >> $GITHUB_ENV

      - name: Set up environment
        shell: bash
        run: |
          echo "SOURCE_BASENAME=${{ inputs.source_basename }}" >> $GITHUB_ENV
          echo "PACKAGE_URL=https://dahl.byu.edu/r/src/contrib/${{ inputs.source_basename }}.tar.gz" >> $GITHUB_ENV

      - name: Debug Variables
        shell: bash
        run: |
          echo "SOURCE_BASENAME: $SOURCE_BASENAME"
          echo "PACKAGE_URL: $PACKAGE_URL"
          echo "CARGO_BUILD_TARGET: $CARGO_BUILD_TARGET"

      - name: Download Source Package
        shell: bash
        run: |
          curl -fL --retry 3 --retry-all-errors -o "${SOURCE_BASENAME}.tar.gz" "${PACKAGE_URL}"

      - name: Set Up R Environment
        uses: r-lib/actions/setup-r@v2

      - name: Install Dependencies from DESCRIPTION
        shell: bash
        run: |
          Rscript -e '
            repos <- c(
              dahl = "https://dahl.byu.edu/r",
              dbdahl = "https://dbdahl.r-universe.dev",
              CRAN = "https://cloud.r-project.org"
            )
            source_tarball <- paste0(Sys.getenv("SOURCE_BASENAME"), ".tar.gz")
            unpack_dir <- tempfile("pkgsrc-")
            dir.create(unpack_dir)
            utils::untar(source_tarball, exdir = unpack_dir)
            pkg_dirs <- list.dirs(unpack_dir, full.names = TRUE, recursive = FALSE)
            stopifnot(length(pkg_dirs) == 1)
            desc <- read.dcf(file.path(pkg_dirs, "DESCRIPTION"))
            dep_fields <- intersect(c("Depends", "Imports", "LinkingTo"), colnames(desc))
            base_pkgs <- rownames(installed.packages(priority = c("base", "recommended")))
            parse_deps <- function(fields) {
              if (!length(fields)) return(character())
              x <- trimws(unlist(strsplit(paste(fields, collapse = ","), ",")))
              x <- trimws(sub("[(].*$", "", x))
              unique(setdiff(x[nzchar(x)], c("R", base_pkgs)))
            }
            direct <- parse_deps(desc[1, dep_fields])
            if (!length(direct)) {
              message("No package dependencies to install.")
              quit(save = "no")
            }
            message("Installing direct dependencies with recursive strong deps: ",
                    paste(sort(direct), collapse = ", "))
            install.packages(direct, repos = repos, dependencies = NA)
          '

      - name: Build Binary Package
        shell: bash
        run: |
          R CMD INSTALL --build ${SOURCE_BASENAME}.tar.gz

      - name: Locate Built Binary
        shell: bash
        run: |
          shopt -s nullglob
          files=( "${SOURCE_BASENAME}"*.tgz "${SOURCE_BASENAME}"*.zip )
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one built binary artifact, found ${#files[@]}." >&2
            printf '%s\n' "${files[@]}" >&2
            exit 1
          fi
          echo "BINARY_FILE=${files[0]}" >> $GITHUB_ENV

      - name: Upload Binary R Package
        id: upload
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.BINARY_FILE }}
          archive: false
          retention-days: 1
