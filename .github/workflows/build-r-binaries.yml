name: Build Binary R Package

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      source_basename:
        description: "Source tarball basename, e.g. salso_0.3.72"
        required: true
        type: string
      os:
        description: "Target OS for binary package"
        required: true
        type: choice
        options:
          - windows
          - macOS

jobs:
  build-r-package:
    runs-on: ${{ inputs.os == 'windows' && 'windows-latest' || 'macos-latest' }}

    steps:
      - name: Install Rust GNU Toolchain (Windows only)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          rustup toolchain install stable-x86_64-pc-windows-gnu
          rustup default stable-x86_64-pc-windows-gnu
          rustup target add x86_64-pc-windows-gnu
          echo "CARGO_BUILD_TARGET=x86_64-pc-windows-gnu" >> $GITHUB_ENV

      - name: Set up environment
        shell: bash
        run: |
          echo "SOURCE_BASENAME=${{ inputs.source_basename }}" >> $GITHUB_ENV
          echo "PACKAGE_URL=https://dahl.byu.edu/r/src/contrib/${{ inputs.source_basename }}.tar.gz" >> $GITHUB_ENV

      - name: Debug Variables
        shell: bash
        run: |
          echo "SOURCE_BASENAME: $SOURCE_BASENAME"
          echo "PACKAGE_URL: $PACKAGE_URL"
          echo "CARGO_BUILD_TARGET: $CARGO_BUILD_TARGET"

      - name: Download Source Package
        shell: bash
        run: |
          curl -fL --retry 3 --retry-all-errors -o "${SOURCE_BASENAME}.tar.gz" "${PACKAGE_URL}"

      - name: Set Up R Environment
        uses: r-lib/actions/setup-r@v2

      - name: Extract Dependencies from DESCRIPTION
        shell: bash
        run: |
          desc_path="$(tar -tzf "${SOURCE_BASENAME}.tar.gz" | awk '/\/DESCRIPTION$/ { print; exit }')"
          if [ -z "$desc_path" ]; then
            echo "Could not locate DESCRIPTION in ${SOURCE_BASENAME}.tar.gz" >&2
            exit 1
          fi

          deps="$(
            tar -xOf "${SOURCE_BASENAME}.tar.gz" "$desc_path" |
              awk '
                BEGIN {
                  capture = 0
                  line = ""
                }
                /^(Depends|Imports|LinkingTo):/ {
                  capture = 1
                  sub(/^[^:]+:[[:space:]]*/, "", $0)
                  line = line "," $0
                  next
                }
                capture && /^[[:space:]]/ {
                  sub(/^[[:space:]]+/, "", $0)
                  line = line "," $0
                  next
                }
                {
                  capture = 0
                }
                END {
                  print line
                }
              ' |
              tr ',' '\n' |
              sed -E 's/[[:space:]]*\(.*$//' |
              sed -E 's/^[[:space:]]+|[[:space:]]+$//g' |
              awk '
                BEGIN {
                  split("R base compiler datasets graphics grDevices grid methods parallel splines stats stats4 tcltk tools utils boot class cluster codetools foreign KernSmooth lattice MASS Matrix mgcv nlme nnet rpart spatial survival", skip, " ")
                  for (i in skip) excluded[skip[i]] = 1
                }
                NF && !($0 in excluded) {
                  keep[$0] = 1
                }
                END {
                  first = 1
                  for (pkg in keep) {
                    if (!first) printf ","
                    printf "%s", pkg
                    first = 0
                  }
                  printf "\n"
                }
              '
          )"

          echo "DIRECT_DEPS=$deps" >> "$GITHUB_ENV"
          if [ -n "$deps" ]; then
            echo "DIRECT_DEPS: $deps"
          else
            echo "No package dependencies to install."
          fi

      - name: Install Dependencies
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ -z "${DIRECT_DEPS:-}" ]; then
            exit 0
          fi
          Rscript -e '
            repos <- c(
              dahl = "https://dahl.byu.edu/r",
              dbdahl = "https://dbdahl.r-universe.dev",
              CRAN = "https://cloud.r-project.org"
            )
            deps <- strsplit(Sys.getenv("DIRECT_DEPS"), ",", fixed = TRUE)[[1]]
            message("Installing direct dependencies with recursive strong deps: ",
                    paste(deps, collapse = ", "))
            install.packages(deps, repos = repos, dependencies = NA)
          '

      - name: Install Dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:DIRECT_DEPS)) {
            exit 0
          }

          $scriptPath = Join-Path $env:RUNNER_TEMP 'install-deps.R'
          @'
          repos <- c(
            dahl = "https://dahl.byu.edu/r",
            dbdahl = "https://dbdahl.r-universe.dev",
            CRAN = "https://cloud.r-project.org"
          )
          deps <- strsplit(Sys.getenv("DIRECT_DEPS"), ",", fixed = TRUE)[[1]]
          message("Installing direct dependencies with recursive strong deps: ",
                  paste(deps, collapse = ", "))
          install.packages(deps, repos = repos, dependencies = NA)
          '@ | Set-Content -Path $scriptPath -Encoding UTF8

          Rscript $scriptPath

      - name: Build Binary Package
        shell: bash
        run: |
          R CMD INSTALL --build ${SOURCE_BASENAME}.tar.gz

      - name: Locate Built Binary
        shell: bash
        run: |
          shopt -s nullglob
          files=( "${SOURCE_BASENAME}"*.tgz "${SOURCE_BASENAME}"*.zip )
          if [ "${#files[@]}" -ne 1 ]; then
            echo "Expected exactly one built binary artifact, found ${#files[@]}." >&2
            printf '%s\n' "${files[@]}" >&2
            exit 1
          fi
          echo "BINARY_FILE=${files[0]}" >> $GITHUB_ENV

      - name: Upload Binary R Package
        id: upload
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.BINARY_FILE }}
          archive: false
          retention-days: 1
